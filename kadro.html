<!DOCTYPE html>

<title>Kadro</title>

<style>
    .player-container{
display:flex;
justify-content:center;
margin-top:60px;
}

.player-card{
width:200px;
height:260px;
perspective:1000px;
}

.card-inner{
position:relative;
width:100%;
height:100%;
transition:transform 0.8s;
transform-style:preserve-3d;
}

.player-card:hover .card-inner{
transform:rotateY(180deg);
}

.card-front, .card-back{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
border-radius:15px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
font-weight:bold;
}

.card-front{
background:linear-gradient(45deg,#ffcc00,#cc0000);
color:white;
}

.card-back{
background:black;
color:gold;
transform:rotateY(180deg);
}

    
.stadium-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background:radial-gradient(circle, rgba(255,0,0,0.4), black);

animation:stadiumLight 5s infinite;

z-index:-1;
}

@keyframes stadiumLight{

0%{
background:radial-gradient(circle, rgba(255,0,0,0.4), black);
}

50%{
background:radial-gradient(circle, rgba(255,215,0,0.5), black);
}

100%{
background:radial-gradient(circle, rgba(255,0,0,0.4), black);
}

}


</style>

</head>


<style>
    .konfeti{
position:relative;
display:inline-block;
}

.konfeti::after{
content:"";
position:absolute;
top:-20px;
left:0;
width:100%;
height:100px;

background-image:
radial-gradient(circle, red 4px, transparent 5px),
radial-gradient(circle, yellow 4px, transparent 5px),
radial-gradient(circle, red 4px, transparent 5px),
radial-gradient(circle, yellow 4px, transparent 5px);

background-size:40px 40px;

animation: konfetiYagmur 3s infinite linear;

opacity:0.8;
}

@keyframes konfetiYagmur{

0%{
background-position:0 -50px;
}

100%{
background-position:0 100px;
}

}
